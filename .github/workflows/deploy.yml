name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ec2-user
          key: ${{ secrets.AWS_KEY }}
          script: |
            cd ~/website-monitor
            git pull
            sudo cp ~/website-monitor/index.html /usr/share/nginx/html/index.htmlS